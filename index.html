<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DaveAI — Dave's Friendly AI</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1B1F1D">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DaveAI">
<link rel="icon" href="./daveai-icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="./daveai-icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root{
    --bg: #1B1F1D;
    --surface: #232823;
    --surface-2: #2B322C;
    --text: #E8E6DE;
    --text-dim: #9CA69C;
    --sage: #7FA88F;
    --sage-bright: #9BC4AA;
    --gold: #C9A66B;
    --border: rgba(232,230,222,0.08);
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  html,body{
    height:100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body{
    display:flex;
    flex-direction:column;
    max-width: 720px;
    margin: 0 auto;
    height: 100vh;
  }

  header{
    display:flex;
    align-items:center;
    gap:14px;
    padding: calc(18px + env(safe-area-inset-top)) 20px 18px;
    border-bottom: 1px solid var(--border);
    flex-shrink:0;
  }

  .orb{
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, var(--sage-bright), var(--sage) 60%, #4d6b5a 100%);
    box-shadow: 0 0 0 0 rgba(127,168,143,0.5);
    animation: breathe 4s ease-in-out infinite;
    flex-shrink:0;
  }

  @keyframes breathe{
    0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(127,168,143,0.35); }
    50% { transform: scale(1.12); box-shadow: 0 0 0 8px rgba(127,168,143,0); }
  }

  .orb.thinking{
    animation: breathe 1.4s ease-in-out infinite;
  }

  header .titles{ display:flex; flex-direction:column; flex:1; }

  .clear-btn{
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 34px; height:34px;
    border-radius: 10px;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
    transition: color 0.15s, border-color 0.15s;
  }
  .clear-btn:hover{ color: var(--gold); border-color: var(--gold); }

  .install-btn{
    display: none;
    align-items:center;
    gap:6px;
    background: var(--sage);
    color: #12150F;
    border:none;
    font-family:'Inter', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 8px 12px;
    border-radius: 10px;
    cursor:pointer;
    flex-shrink:0;
    transition: background 0.15s;
  }
  .install-btn:hover{ background: var(--sage-bright); }
  header h1{
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 1.15rem;
    letter-spacing: 0.01em;
  }
  header p{
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 1px;
  }

  .messages{
    flex:1;
    overflow-y:auto;
    padding: 24px 20px;
    display:flex;
    flex-direction:column;
    gap: 18px;
    scroll-behavior:smooth;
  }

  .messages::-webkit-scrollbar{ width:6px; }
  .messages::-webkit-scrollbar-thumb{ background: var(--surface-2); border-radius:3px; }

  .row{ display:flex; gap:10px; align-items:flex-start; }
  .row.user{ flex-direction: row-reverse; }

  .avatar{
    width: 26px; height:26px; border-radius:50%;
    flex-shrink:0; margin-top:4px;
    display:flex; align-items:center; justify-content:center;
    font-size: 0.65rem; font-weight:600;
  }
  .avatar.bot{ background: var(--sage); color:#12150F; }
  .avatar.user{ background: var(--gold); color:#12150F; }

  .bubble{
    max-width: 76%;
    padding: 12px 15px;
    border-radius: 14px;
    font-size: 0.92rem;
    line-height: 1.55;
  }

  .row.bot .bubble{
    background: var(--surface);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }

  .row.user .bubble{
    background: var(--surface-2);
    border-top-right-radius: 4px;
    color: var(--text);
  }

  .bubble h1,.bubble h2,.bubble h3{
    font-family:'Fraunces', serif;
    font-weight:500;
    margin: 6px 0 4px;
    color: var(--sage-bright);
  }
  .bubble ul, .bubble ol{ margin: 6px 0 6px 20px; }
  .bubble li{ margin: 2px 0; }
  .bubble p{ margin: 4px 0; }
  .bubble strong{ color: var(--sage-bright); font-weight:600; }
  .bubble code{
    font-family:'JetBrains Mono', monospace;
    background: rgba(0,0,0,0.35);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 0.85em;
  }
  .bubble pre{
    background: rgba(0,0,0,0.35);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    overflow-x:auto;
    margin: 6px 0;
  }
  .bubble pre code{ background:none; padding:0; }

  .typing-dots{ display:flex; gap:4px; padding: 4px 2px; }
  .typing-dots span{
    width:6px; height:6px; border-radius:50%;
    background: var(--text-dim);
    animation: blink 1.2s infinite ease-in-out;
  }
  .typing-dots span:nth-child(2){ animation-delay: 0.2s; }
  .typing-dots span:nth-child(3){ animation-delay: 0.4s; }
  @keyframes blink{ 0%, 80%, 100%{ opacity:0.25; } 40%{ opacity:1; } }

  .composer{
    border-top: 1px solid var(--border);
    padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
    display:flex;
    gap:10px;
    align-items:flex-end;
    flex-shrink:0;
  }

  textarea{
    flex:1;
    resize:none;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family:'Inter', sans-serif;
    font-size: 0.92rem;
    padding: 11px 14px;
    border-radius: 12px;
    max-height: 140px;
    line-height:1.4;
    outline:none;
    transition: border-color 0.15s;
  }
  textarea:focus{ border-color: var(--sage); }
  textarea::placeholder{ color: var(--text-dim); }

  button.send{
    background: var(--sage);
    color: #12150F;
    border:none;
    width: 42px; height:42px;
    border-radius: 12px;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
    transition: background 0.15s, transform 0.1s;
  }
  button.send:hover:not(:disabled){ background: var(--sage-bright); }
  button.send:active:not(:disabled){ transform: scale(0.94); }
  button.send:disabled{ opacity:0.4; cursor:not-allowed; }

  .hint{
    text-align:center;
    font-size: 0.7rem;
    color: var(--text-dim);
    padding: 0 0 10px;
  }

  .error-banner{
    background: rgba(201,166,107,0.12);
    border: 1px solid rgba(201,166,107,0.3);
    color: var(--gold);
    font-size: 0.8rem;
    padding: 8px 12px;
    border-radius: 8px;
    margin: 0 20px;
  }
</style>
</head>
<body>

<header>
  <div class="orb" id="orb"></div>
  <div class="titles">
    <h1>DaveAI</h1>
    <p>Dave's friendly AI · patient, honest, always here</p>
  </div>
  <button class="install-btn" id="installBtn" title="Install DaveAI" aria-label="Install DaveAI">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
      <path d="M12 3V15M12 15L7 10M12 15L17 10M5 20H19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Install
  </button>
  <button class="clear-btn" id="clearBtn" title="Clear chat history" aria-label="Clear chat history">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
      <path d="M4 7H20M9 7V4H15V7M6 7L7 20H17L18 7" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</header>

<div class="messages" id="messages"></div>

<div class="composer">
  <textarea id="input" placeholder="Ask DaveAI anything..." rows="1"></textarea>
  <button class="send" id="sendBtn" aria-label="Send message">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
      <path d="M4 12L20 4L13 20L11 13L4 12Z" stroke="#12150F" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
    </svg>
  </button>
</div>
<p class="hint">DaveAI can make mistakes. Double-check important facts.</p>

<script>
const SYSTEM_PROMPT = `You are a friendly, helpful, and intelligent AI assistant.

Your goals are:

- Answer questions accurately and clearly.
- Explain difficult topics in simple language.
- Be polite, patient, and respectful.
- If you don't know the answer, say so instead of making something up.
- Ask follow-up questions when more information is needed.
- Keep answers concise unless the user asks for more detail.
- Help with coding, homework, writing, math, science, technology, and everyday questions.
- Correct mistakes politely and explain the correct information.
- Format responses with headings, bullet points, or numbered lists when helpful.
- Never generate false information intentionally.
- Always prioritize user safety and privacy.
- Respond naturally, as if talking to a real person.
- Remember the context of the current conversation to give better responses.

Your personality:

- Friendly
- Calm
- Professional
- Honest
- Encouraging
- Patient

When writing code:

- Use clean, readable code.
- Explain what the code does.
- Include comments when appropriate.
- Suggest improvements if possible.

Always strive to be accurate, helpful, and easy to understand.`;

const messagesEl = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const orb = document.getElementById('orb');

let history = [];
const STORAGE_KEY = 'daveai-chat-history';

async function saveHistory(){
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify(history), false);
  } catch(err){
    console.error('Could not save chat history:', err);
  }
}

async function loadHistory(){
  try{
    const result = await window.storage.get(STORAGE_KEY, false);
    if(result && result.value){
      const saved = JSON.parse(result.value);
      if(Array.isArray(saved) && saved.length){
        history = saved;
        for(const msg of history){
          addMessage(msg.role === 'user' ? 'user' : 'bot', msg.content);
        }
        return true;
      }
    }
  } catch(err){
    // no saved history yet, that's fine
  }
  return false;
}

async function clearHistory(){
  history = [];
  messagesEl.innerHTML = '';
  try{
    await window.storage.delete(STORAGE_KEY, false);
  } catch(err){
    // nothing stored, that's fine
  }
  addMessage('bot', WELCOME_MESSAGE);
}

function scrollToBottom(){
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function renderMarkdown(text){
  let escaped = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  escaped = escaped.replace(/```([\s\S]*?)```/g, (m, code) => `<pre><code>${code.trim()}</code></pre>`);
  escaped = escaped.replace(/`([^`]+)`/g, '<code>$1</code>');
  escaped = escaped.replace(/^### (.*$)/gim, '<h3>$1</h3>');
  escaped = escaped.replace(/^## (.*$)/gim, '<h2>$1</h2>');
  escaped = escaped.replace(/^# (.*$)/gim, '<h1>$1</h1>');
  escaped = escaped.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  const lines = escaped.split('\n');
  let html = '';
  let inList = false;
  let listType = 'ul';
  for(const line of lines){
    const bulletMatch = line.match(/^\s*[-*]\s+(.*)/);
    const numberMatch = line.match(/^\s*\d+\.\s+(.*)/);
    if(bulletMatch || numberMatch){
      const type = bulletMatch ? 'ul' : 'ol';
      if(!inList || listType !== type){
        if(inList) html += `</${listType}>`;
        html += `<${type}>`;
        inList = true;
        listType = type;
      }
      html += `<li>${bulletMatch ? bulletMatch[1] : numberMatch[1]}</li>`;
    } else {
      if(inList){ html += `</${listType}>`; inList = false; }
      if(line.trim() === '') continue;
      if(line.startsWith('<h') || line.startsWith('<pre')){
        html += line;
      } else {
        html += `<p>${line}</p>`;
      }
    }
  }
  if(inList) html += `</${listType}>`;
  return html;
}

function addMessage(role, text){
  const row = document.createElement('div');
  row.className = `row ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'bot' ? 'D' : 'Y';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = renderMarkdown(text);

  row.appendChild(avatar);
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  scrollToBottom();
  return bubble;
}

function addTypingIndicator(){
  const row = document.createElement('div');
  row.className = 'row bot';
  row.id = 'typingRow';

  const avatar = document.createElement('div');
  avatar.className = 'avatar bot';
  avatar.textContent = 'D';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

  row.appendChild(avatar);
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  scrollToBottom();
}

function removeTypingIndicator(){
  const row = document.getElementById('typingRow');
  if(row) row.remove();
}

function showError(msg){
  const banner = document.createElement('div');
  banner.className = 'error-banner';
  banner.textContent = msg;
  messagesEl.appendChild(banner);
  scrollToBottom();
}

async function sendMessage(){
  const text = input.value.trim();
  if(!text) return;

  addMessage('user', text);
  history.push({ role: 'user', content: text });
  saveHistory();
  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;
  orb.classList.add('thinking');
  addTypingIndicator();

  try{
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    if(!response.ok){
      throw new Error(`Request failed (${response.status})`);
    }

    const data = await response.json();
    const replyText = data.content
      .map(block => block.type === 'text' ? block.text : '')
      .filter(Boolean)
      .join('\n');

    removeTypingIndicator();
    addMessage('bot', replyText || "I couldn't generate a response — try again?");
    history.push({ role: 'assistant', content: replyText });
    saveHistory();

  } catch(err){
    removeTypingIndicator();
    showError(`DaveAI hit a snag: ${err.message}. Please try again.`);
  } finally {
    sendBtn.disabled = false;
    orb.classList.remove('thinking');
    input.focus();
  }
}

document.getElementById('clearBtn').addEventListener('click', () => {
  if(confirm('Clear your chat history with DaveAI? This cannot be undone.')){
    clearHistory();
  }
});

sendBtn.addEventListener('click', sendMessage);

input.addEventListener('keydown', (e) => {
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
});

input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 140) + 'px';
});

const WELCOME_MESSAGE = "Hi, I'm **DaveAI**. Ask me about coding, homework, writing, or anything else — I'll do my best to explain clearly and honestly. What are you working on?";

(async function init(){
  const hadHistory = await loadHistory();
  if(!hadHistory){
    addMessage('bot', WELCOME_MESSAGE);
  }
})();

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch((err) => {
      console.log('Service worker registration skipped:', err.message);
    });
  });
}

let deferredInstallPrompt = null;
const installBtn = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  if(installBtn) installBtn.style.display = 'flex';
});

if(installBtn){
  installBtn.addEventListener('click', async () => {
    if(!deferredInstallPrompt) return;
    deferredInstallPrompt.prompt();
    await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    installBtn.style.display = 'none';
  });
}

window.addEventListener('appinstalled', () => {
  if(installBtn) installBtn.style.display = 'none';
});
</script>

</body>
  </html>
